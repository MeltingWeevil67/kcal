<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KCAL — Calorie Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KCAL">
<meta name="theme-color" content="#c8ff00">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4444;
    --success: #00e676;
    --goal: 2000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  .date-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .date-pill:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Ring Summary ── */
  .summary-card {
    margin: 0 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .ring-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .ring-svg { transform: rotate(-90deg); }

  .ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1), stroke 0.3s;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-kcal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    line-height: 1;
    color: var(--accent);
  }

  .ring-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .summary-stats { flex: 1; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }

  .stat-name { font-size: 12px; color: var(--muted); }
  .stat-val { font-size: 16px; font-weight: 700; }
  .stat-val.over { color: var(--danger); }
  .stat-val.good { color: var(--success); }
  .stat-val.warn { color: var(--accent2); }

  /* ── Quick goal bar ── */
  .goal-bar-wrap {
    margin: 0 20px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .goal-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .goal-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1), background 0.3s;
  }
  .goal-bar-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── Action Buttons ── */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 0 20px 28px;
  }

  .btn-action {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    color: var(--text);
  }

  .btn-action:hover, .btn-action:active {
    border-color: var(--accent);
    background: #1a1f00;
    transform: scale(0.98);
  }

  .btn-action.scan { border-color: #333; }
  .btn-action.manual { border-color: #333; }

  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .btn-icon.scan-icon { background: rgba(200,255,0,0.12); }
  .btn-icon.manual-icon { background: rgba(255,107,53,0.12); }

  .btn-title { font-size: 14px; font-weight: 600; }
  .btn-sub { font-size: 11px; color: var(--muted); }

  /* ── Log Section ── */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px 12px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .clear-btn {
    font-size: 12px;
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.7;
  }
  .clear-btn:hover { opacity: 1; }

  /* ── Log Items ── */
  .log-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--accent);
  }

  .log-info { flex: 1; min-width: 0; }
  .log-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .log-kcal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .log-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .log-del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  .spacer { height: 100px; }

  /* ── Modals ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    max-height: 90vh;
    overflow-y: auto;
  }

  .overlay.active .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    color: var(--accent);
  }

  /* ── Scanner ── */
  #scanner-container {
    position: relative;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    height: 240px;
    margin-bottom: 20px;
  }

  #scanner-container video,
  #scanner-container canvas {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .scanner-frame {
    width: 200px;
    height: 100px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
    position: relative;
  }

  .scanner-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    top: 50%;
    animation: scanMove 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }

  @keyframes scanMove {
    0%, 100% { top: 10%; }
    50% { top: 90%; }
  }

  .scanner-status {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .scanner-status.detected { color: var(--accent); font-weight: 600; }
  .scanner-status.error { color: var(--danger); }

  /* ── Food result card ── */
  .food-result {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .food-result.visible { display: block; animation: slideIn 0.3s ease; }

  .food-result-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .food-result-brand { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .food-macros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }

  .macro-chip {
    background: var(--surface);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
  }
  .macro-chip .val { font-size: 15px; font-weight: 700; color: var(--accent); }
  .macro-chip .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ── Serving selector ── */
  .serving-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .serving-label { font-size: 13px; color: var(--muted); flex: 1; }
  .serving-controls { display: flex; align-items: center; gap: 10px; }

  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }

  .qty-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    min-width: 30px;
    text-align: center;
    color: var(--accent);
  }

  /* ── Form inputs ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; letter-spacing: 0.5px; text-transform: uppercase; }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }

  /* ── Primary Button ── */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: #d4ff1a; transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  /* ── Goal Settings ── */
  .goal-display {
    text-align: center;
    margin-bottom: 20px;
  }
  .goal-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: var(--accent);
    line-height: 1;
  }
  .goal-sub { font-size: 13px; color: var(--muted); }

  .goal-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
    margin-bottom: 20px;
  }
  .goal-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(200,255,0,0.4);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    z-index: 500;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    color: var(--accent);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── History dots ── */
  .week-strip {
    display: flex;
    gap: 8px;
    padding: 0 20px 20px;
  }
  .day-dot {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .day-dot-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.3s;
    cursor: pointer;
  }
  .day-dot-circle.today {
    border-color: var(--accent);
    color: var(--accent);
  }
  .day-dot-circle.logged {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .day-dot-circle.over {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }
  .day-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

  /* ── Manual meal type pills ── */
  .meal-type-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .meal-pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
  }
  .meal-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,255,0,0.08);
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">KCAL</div>
  <div class="date-pill" id="datePill" onclick="openGoalModal()">⚙️ Set Goal</div>
</div>

<!-- Week Strip -->
<div class="week-strip" id="weekStrip"></div>

<!-- Ring Summary -->
<div class="summary-card">
  <div class="ring-wrap">
    <svg class="ring-svg" width="110" height="110" viewBox="0 0 110 110">
      <circle class="ring-track" cx="55" cy="55" r="46"/>
      <circle class="ring-fill" id="ringFill" cx="55" cy="55" r="46"
        stroke-dasharray="289"
        stroke-dashoffset="289"/>
    </svg>
    <div class="ring-center">
      <div class="ring-kcal" id="totalDisplay">0</div>
      <div class="ring-label">kcal</div>
    </div>
  </div>
  <div class="summary-stats">
    <div class="stat-row">
      <span class="stat-name">Goal</span>
      <span class="stat-val" id="goalDisplay">2000</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">Remaining</span>
      <span class="stat-val" id="remainDisplay">2000</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">Entries</span>
      <span class="stat-val" id="entryCount">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">Avg/item</span>
      <span class="stat-val" id="avgDisplay">—</span>
    </div>
  </div>
</div>

<!-- Goal Bar -->
<div class="goal-bar-wrap">
  <div class="goal-bar-track">
    <div class="goal-bar-fill" id="goalBarFill" style="width:0%"></div>
  </div>
  <div class="goal-bar-label" id="goalBarLabel">0%</div>
</div>

<!-- Action Buttons -->
<div class="actions">
  <button class="btn-action scan" onclick="openScanner()">
    <div class="btn-icon scan-icon">📷</div>
    <div class="btn-title">Scan Barcode</div>
    <div class="btn-sub">Use camera to scan</div>
  </button>
  <button class="btn-action manual" onclick="openManual()">
    <div class="btn-icon manual-icon">✏️</div>
    <div class="btn-title">Add Manual</div>
    <div class="btn-sub">Type in calories</div>
  </button>
</div>

<!-- Log -->
<div class="section-header">
  <div class="section-title">Today's Log</div>
  <button class="clear-btn" onclick="clearToday()">Clear all</button>
</div>

<div class="log-list" id="logList">
  <div class="empty-state">
    <div class="empty-icon">🍽️</div>
    <div class="empty-text">Nothing logged yet.<br>Scan a barcode or add manually.</div>
  </div>
</div>

<div class="spacer"></div>

<!-- ── SCANNER MODAL ── -->
<div class="overlay" id="scannerOverlay" onclick="handleOverlayClick(event, 'scannerOverlay', closeScanner)">
  <div class="modal" id="scannerModal">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 Scan Barcode</div>

    <div id="scanner-container">
      <div class="scanner-overlay">
        <div class="scanner-frame"><div class="scanner-line"></div></div>
      </div>
    </div>

    <div class="scanner-status" id="scannerStatus">Point camera at a barcode</div>

    <!-- Food result after scan -->
    <div class="food-result" id="foodResult">
      <div class="food-result-name" id="frName"></div>
      <div class="food-result-brand" id="frBrand"></div>
      <div class="food-macros">
        <div class="macro-chip"><div class="val" id="frCal">0</div><div class="lbl">kcal</div></div>
        <div class="macro-chip"><div class="val" id="frCarb">0g</div><div class="lbl">carbs</div></div>
        <div class="macro-chip"><div class="val" id="frProt">0g</div><div class="lbl">protein</div></div>
        <div class="macro-chip"><div class="val" id="frFat">0g</div><div class="lbl">fat</div></div>
      </div>
      <div class="serving-row">
        <div class="serving-label" id="servingLabel">Servings (per 100g)</div>
        <div class="serving-controls">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-val" id="qtyVal">1</div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <button class="btn-primary" onclick="addScannedFood()">Add to Log</button>
    </div>

    <button class="btn-secondary" onclick="closeScanner()">Cancel</button>
  </div>
</div>

<!-- ── MANUAL MODAL ── -->
<div class="overlay" id="manualOverlay" onclick="handleOverlayClick(event, 'manualOverlay', closeManual)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Add Manually</div>

    <div class="meal-type-row" id="mealTypeRow">
      <button class="meal-pill active" onclick="setMealType('Breakfast', this)">🌅 Breakfast</button>
      <button class="meal-pill" onclick="setMealType('Lunch', this)">☀️ Lunch</button>
      <button class="meal-pill" onclick="setMealType('Dinner', this)">🌙 Dinner</button>
      <button class="meal-pill" onclick="setMealType('Snack', this)">🍎 Snack</button>
    </div>

    <div class="form-group">
      <label class="form-label">Food Name</label>
      <input class="form-input" id="manualName" placeholder="e.g. White toast, Chocolate cake..." />
    </div>
    <div class="form-group">
      <label class="form-label">Calories (kcal)</label>
      <input class="form-input" id="manualCal" type="number" placeholder="e.g. 250" min="1" max="9999"/>
    </div>
    <div class="form-group">
      <label class="form-label">Brand / Notes (optional)</label>
      <input class="form-input" id="manualBrand" placeholder="e.g. Warburtons, Tesco..." />
    </div>

    <button class="btn-primary" onclick="addManual()">Add to Log</button>
    <button class="btn-secondary" onclick="closeManual()">Cancel</button>
  </div>
</div>

<!-- ── GOAL MODAL ── -->
<div class="overlay" id="goalOverlay" onclick="handleOverlayClick(event, 'goalOverlay', closeGoalModal)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Daily Goal</div>

    <div class="goal-display">
      <div class="goal-big" id="goalBigDisplay">2000</div>
      <div class="goal-sub">kcal / day</div>
    </div>

    <input type="range" class="goal-slider" id="goalSlider" min="1000" max="5000" step="50" value="2000"
      oninput="updateGoalSlider(this.value)" />

    <div class="form-group">
      <label class="form-label">Or type exact value</label>
      <input class="form-input" id="goalInput" type="number" placeholder="2000" min="1000" max="9999"/>
    </div>

    <button class="btn-primary" onclick="saveGoal()">Save Goal</button>
    <button class="btn-secondary" onclick="closeGoalModal()">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let state = JSON.parse(localStorage.getItem('kcal_state') || '{}');
if (!state.goal) state.goal = 2000;
if (!state.days) state.days = {};

let todayKey = getTodayKey();
if (!state.days[todayKey]) state.days[todayKey] = [];

let currentFood = null;
let currentQty = 1;
let currentMealType = 'Breakfast';
let quaggaRunning = false;
let lastBarcode = null;

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function save() {
  localStorage.setItem('kcal_state', JSON.stringify(state));
}

// ── Date display ──
function updateDatePill() {
  const d = new Date();
  document.getElementById('datePill').textContent =
    d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ── Week Strip ──
function renderWeekStrip() {
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  const days = ['M','T','W','T','F','S','S'];
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const mondayOffset = (dow === 0 ? -6 : 1 - dow);

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + mondayOffset + i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = key === getTodayKey();
    const dayData = state.days[key] || [];
    const total = dayData.reduce((s,e) => s + e.kcal, 0);
    const hasEntries = dayData.length > 0;
    const isOver = total > state.goal;

    const dot = document.createElement('div');
    dot.className = 'day-dot';
    dot.innerHTML = `
      <div class="day-dot-circle ${isToday ? 'today' : ''} ${hasEntries && !isToday ? (isOver ? 'over' : 'logged') : ''}">
        ${isToday ? '●' : (hasEntries ? (isOver ? '!' : '✓') : days[i])}
      </div>
      <div class="day-label">${days[i]}</div>
    `;
    strip.appendChild(dot);
  }
}

// ── Render stats ──
function updateUI() {
  const entries = state.days[todayKey] || [];
  const total = entries.reduce((s,e) => s + e.kcal, 0);
  const remain = state.goal - total;
  const pct = Math.min(total / state.goal, 1);
  const circumference = 289;

  document.getElementById('totalDisplay').textContent = total.toLocaleString();
  document.getElementById('goalDisplay').textContent = state.goal.toLocaleString();

  const remEl = document.getElementById('remainDisplay');
  remEl.textContent = Math.abs(remain).toLocaleString() + (remain < 0 ? ' over' : '');
  remEl.className = 'stat-val ' + (remain < 0 ? 'over' : remain < state.goal * 0.15 ? 'warn' : 'good');

  document.getElementById('entryCount').textContent = entries.length;
  document.getElementById('avgDisplay').textContent = entries.length ? Math.round(total/entries.length) : '—';

  // Ring
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = circumference - (pct * circumference);
  ring.style.stroke = remain < 0 ? 'var(--danger)' : remain < state.goal * 0.15 ? 'var(--accent2)' : 'var(--accent)';

  // Bar
  const barPct = Math.min(pct * 100, 100);
  document.getElementById('goalBarFill').style.width = barPct + '%';
  document.getElementById('goalBarFill').style.background = remain < 0 ? 'var(--danger)' : remain < state.goal * 0.15 ? 'var(--accent2)' : 'var(--accent)';
  document.getElementById('goalBarLabel').textContent = Math.round(pct * 100) + '%';

  renderLog(entries);
  renderWeekStrip();
}

// ── Log ──
function renderLog(entries) {
  const list = document.getElementById('logList');
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <div class="empty-text">Nothing logged yet.<br>Scan a barcode or add manually.</div>
    </div>`;
    return;
  }

  const colors = ['var(--accent)', 'var(--accent2)', '#00e5ff', '#ff4081', '#76ff03'];
  list.innerHTML = entries.map((e, i) => `
    <div class="log-item">
      <div class="log-dot" style="background:${colors[i % colors.length]}"></div>
      <div class="log-info">
        <div class="log-name">${e.name}</div>
        <div class="log-meta">${e.meal || ''}${e.brand ? ' · ' + e.brand : ''}${e.time ? ' · ' + e.time : ''}</div>
      </div>
      <div class="log-kcal">${e.kcal}</div>
      <button class="log-del" onclick="deleteEntry(${i})">✕</button>
    </div>
  `).join('');
}

function deleteEntry(i) {
  state.days[todayKey].splice(i, 1);
  save();
  updateUI();
  showToast('Entry removed');
}

function clearToday() {
  if (!state.days[todayKey].length) return;
  if (confirm('Clear all entries for today?')) {
    state.days[todayKey] = [];
    save();
    updateUI();
    showToast('Today cleared');
  }
}

function addEntry(name, kcal, opts = {}) {
  const now = new Date();
  state.days[todayKey].push({
    name,
    kcal: Math.round(kcal),
    brand: opts.brand || '',
    meal: opts.meal || '',
    time: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  });
  save();
  updateUI();
}

// ── Scanner ──
function openScanner() {
  document.getElementById('scannerOverlay').classList.add('active');
  document.getElementById('foodResult').classList.remove('visible');
  document.getElementById('scannerStatus').textContent = 'Initialising camera...';
  document.getElementById('scannerStatus').className = 'scanner-status';
  currentFood = null;
  currentQty = 1;
  document.getElementById('qtyVal').textContent = '1';
  lastBarcode = null;

  setTimeout(() => {
    startQuagga();
  }, 400);
}

function closeScanner() {
  document.getElementById('scannerOverlay').classList.remove('active');
  stopQuagga();
}

function startQuagga() {
  if (quaggaRunning) return;
  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.querySelector('#scanner-container'),
      constraints: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader', 'code_39_reader']
    },
    locate: true,
    numOfWorkers: 2
  }, err => {
    if (err) {
      document.getElementById('scannerStatus').textContent = '⚠️ Camera access denied or not available';
      document.getElementById('scannerStatus').className = 'scanner-status error';
      return;
    }
    Quagga.start();
    quaggaRunning = true;
    document.getElementById('scannerStatus').textContent = 'Point camera at a barcode';
  });

  Quagga.onDetected(result => {
    const code = result.codeResult.code;
    if (code === lastBarcode) return;
    lastBarcode = code;
    lookupBarcode(code);
  });
}

function stopQuagga() {
  if (!quaggaRunning) return;
  Quagga.stop();
  quaggaRunning = false;
}

async function lookupBarcode(barcode) {
  const statusEl = document.getElementById('scannerStatus');
  statusEl.textContent = `🔍 Found barcode: ${barcode} — looking up...`;
  statusEl.className = 'scanner-status detected';
  stopQuagga();

  try {
    const url = `https://world.openfoodfacts.org/api/v0/product/${barcode}.json`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.status === 1) {
      const p = data.product;
      const n = p.nutriments || {};

      currentFood = {
        name: p.product_name || p.product_name_en || 'Unknown Product',
        brand: p.brands || '',
        kcalPer100: n['energy-kcal_100g'] || n['energy-kcal'] || Math.round((n.energy_100g || 0) / 4.184) || 0,
        carbs: Math.round(n.carbohydrates_100g || 0),
        protein: Math.round(n.proteins_100g || 0),
        fat: Math.round(n.fat_100g || 0),
        servingSize: p.serving_size || '100g'
      };

      document.getElementById('frName').textContent = currentFood.name;
      document.getElementById('frBrand').textContent = currentFood.brand || barcode;
      document.getElementById('frCal').textContent = Math.round(currentFood.kcalPer100 * currentQty);
      document.getElementById('frCarb').textContent = currentFood.carbs + 'g';
      document.getElementById('frProt').textContent = currentFood.protein + 'g';
      document.getElementById('frFat').textContent = currentFood.fat + 'g';
      document.getElementById('servingLabel').textContent = `Servings (per 100g, × ${currentQty})`;

      document.getElementById('foodResult').classList.add('visible');
      statusEl.textContent = '✅ Product found!';
    } else {
      statusEl.textContent = `⚠️ Barcode ${barcode} not in database`;
      statusEl.className = 'scanner-status error';
      // Let user rescan
      setTimeout(() => {
        lastBarcode = null;
        startQuagga();
      }, 2000);
    }
  } catch (e) {
    statusEl.textContent = '⚠️ Network error — try manual entry';
    statusEl.className = 'scanner-status error';
  }
}

function changeQty(delta) {
  currentQty = Math.max(0.5, currentQty + delta * 0.5);
  document.getElementById('qtyVal').textContent = currentQty % 1 === 0 ? currentQty : currentQty.toFixed(1);
  if (currentFood) {
    document.getElementById('frCal').textContent = Math.round(currentFood.kcalPer100 * currentQty);
    document.getElementById('servingLabel').textContent = `Servings (per 100g, × ${currentQty})`;
  }
}

function addScannedFood() {
  if (!currentFood) return;
  const kcal = Math.round(currentFood.kcalPer100 * currentQty);
  addEntry(currentFood.name, kcal, { brand: currentFood.brand });
  closeScanner();
  showToast(`Added ${currentFood.name} · ${kcal} kcal`);
}

// ── Manual ──
function openManual() {
  document.getElementById('manualOverlay').classList.add('active');
  document.getElementById('manualName').focus();
}

function closeManual() {
  document.getElementById('manualOverlay').classList.remove('active');
  document.getElementById('manualName').value = '';
  document.getElementById('manualCal').value = '';
  document.getElementById('manualBrand').value = '';
}

function setMealType(type, btn) {
  currentMealType = type;
  document.querySelectorAll('.meal-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

function addManual() {
  const name = document.getElementById('manualName').value.trim();
  const cal = parseFloat(document.getElementById('manualCal').value);
  const brand = document.getElementById('manualBrand').value.trim();

  if (!name) { document.getElementById('manualName').focus(); showToast('Enter a food name'); return; }
  if (!cal || cal < 1) { document.getElementById('manualCal').focus(); showToast('Enter valid calories'); return; }

  addEntry(name, cal, { brand, meal: currentMealType });
  closeManual();
  showToast(`Added ${name} · ${Math.round(cal)} kcal`);
}

// ── Goal modal ──
function openGoalModal() {
  document.getElementById('goalOverlay').classList.add('active');
  document.getElementById('goalSlider').value = state.goal;
  document.getElementById('goalBigDisplay').textContent = state.goal;
  document.getElementById('goalInput').value = state.goal;
}

function closeGoalModal() {
  document.getElementById('goalOverlay').classList.remove('active');
}

function updateGoalSlider(val) {
  document.getElementById('goalBigDisplay').textContent = val;
  document.getElementById('goalInput').value = val;
}

function saveGoal() {
  const typed = parseInt(document.getElementById('goalInput').value);
  const slid = parseInt(document.getElementById('goalSlider').value);
  const val = typed || slid;
  if (val >= 500 && val <= 10000) {
    state.goal = val;
    save();
    updateUI();
    closeGoalModal();
    showToast(`Goal set to ${val} kcal`);
  } else {
    showToast('Enter a goal between 500–10000');
  }
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Overlay click outside ──
function handleOverlayClick(e, overlayId, closeFn) {
  if (e.target.id === overlayId) closeFn();
}

// ── Key entry for manual ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('manualOverlay').classList.contains('active')) addManual();
  }
  if (e.key === 'Escape') {
    closeScanner();
    closeManual();
    closeGoalModal();
  }
});

// ── Goal slider sync ──
document.getElementById('goalInput').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  if (v >= 1000 && v <= 5000) {
    document.getElementById('goalSlider').value = v;
    document.getElementById('goalBigDisplay').textContent = v;
  }
});

// ── Init ──
updateDatePill();
updateUI();

// ── Register Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}

// ── PWA Install Prompt ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    if (deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
      showToast('📲 Tap menu → Add to Home Screen to install');
    }
  }, 3000);
});
</script>
</body>
</html>
